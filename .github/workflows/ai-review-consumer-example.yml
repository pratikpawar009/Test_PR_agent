name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    uses: your-org/ai-pr-reviewer/.github/workflows/review.yml@main
    with:
      min_confidence: "0.65"
      min_severity: "medium"
    secrets: inherit
